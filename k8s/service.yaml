apiVersion: v1
kind: Service
metadata:
  name: volatility-api
  labels: {app: volatility-api}
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
    prometheus.io/path: "/metrics"
spec:
  # ClusterIP for in-cluster + `kubectl port-forward`. For cloud external access
  # switch to type: LoadBalancer (GKE/EKS) or front with an Ingress.
  type: ClusterIP
  selector: {app: volatility-api}
  ports:
    - name: http
      port: 80
      targetPort: 8000
