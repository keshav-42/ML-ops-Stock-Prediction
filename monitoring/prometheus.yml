# Prometheus scrape config (used by docker-compose / k8s in Phase 6).
global:
  scrape_interval: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # The FastAPI service exposes /metrics (latency, QPS, errors, cache).
  - job_name: volatility-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:8000"]

  # Pushgateway receives batch monitoring gauges (closed-loop accuracy, drift PSI).
  - job_name: pushgateway
    honor_labels: true
    static_configs:
      - targets: ["pushgateway:9091"]
