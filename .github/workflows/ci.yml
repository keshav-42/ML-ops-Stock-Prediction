# CI: the leakage suite + all tests gate every push; the dashboard must build.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # CPU-only torch first so requirements.txt doesn't pull the CUDA wheel.
      - run: pip install torch==2.8.0 --index-url https://download.pytorch.org/whl/cpu
      - run: pip install -r requirements.txt
      - run: pytest -q

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
